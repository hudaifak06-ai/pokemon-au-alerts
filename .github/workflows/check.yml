name: pokemon-restock-check

# Runs every 10 minutes. GitHub's free tier gives you 2000 minutes/month
# of Actions time on private repos (unlimited on public). Each run takes
# roughly 1-2 minutes, so 10-minute cadence stays comfortably inside
# the free tier on a public repo.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit updated state.json

concurrency:
  group: pokemon-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run restock check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check.py --config config.yaml --state state.json

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "pokemon-bot"
            git config user.email "pokemon-bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state $(date -u +%FT%TZ)"
            git push
          fi
